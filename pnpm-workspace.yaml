# Root machinery deps only (eslint/tsc/knip over installer/, scripts/, tests/,
# template gate scripts) — this is NOT a monorepo workspace; pnpm 11 reads
# settings from this file. The scaffold ships its OWN pnpm-workspace.yaml
# (template/base/pnpm-workspace.yaml); `init --consume` overwrites this one.
#
# typescript is force-pinned tree-wide: eslint-plugin-sonarjs declares
# `typescript: >=5` and would resolve to the 7.x native-compiler line, whose
# CJS API drops ts.SyntaxKind — the plugin crashes at rule-load time.
# 6.0.3 matches the consumer catalog pin (template/base/pnpm-workspace.yaml).
overrides:
  typescript: 6.0.3

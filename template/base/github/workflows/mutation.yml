# Mutation testing — the NIGHTLY full net, in both languages. The per-PR lane lives in
# quality-gate.yml (blocking, scoped to the critical files the PR touched); this one is the
# unscoped sweep that catches what a diff-scoped lane structurally cannot: a survivor born in
# file A by a change to file B.
#
# NOT advisory. Both jobs can fail the night. The pre-promotion version of this workflow
# carried `continue-on-error: true` on every per-PR job with a note to remove it "once a
# measured run confirms the modules clear 80%" — that measurement was never taken, and when
# it finally was, the exemplar's critical set scored 66%. A threshold nobody measured is
# either vacuous or a permanent red light; the SET-based ratchet is neither.
# SOURCE: docs/harness/gates-catalog.md (mutation-ratchet) [corpus: harness/doctrine]
name: mutation

on:
  schedule:
    # Nightly. 03:17 UTC.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # The whole critical surface (tools/lib/mutation-critical.mjs), every mutant.
  # A survivor the baseline does not accept reds the run; a baseline survivor the
  # tests have since learned to kill prints a ratchet-tighten hint.
  # ---------------------------------------------------------------------------
  stryker-full:
    name: stryker (nightly, full critical surface)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm mutation` = stryker run && the ratchet. Split here so a Stryker crash and a
      # ratchet failure are distinguishable in the run log.
      - name: Mutation testing (StrykerJS, full)
        run: pnpm exec stryker run stryker.config.mjs

      - name: Mutation ratchet (survivors vs the committed baseline)
        run: node tools/check-mutation-ratchet.mjs

      - name: Upload the mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Rust host: cargo-mutants restricted to the PR's own diff, so the lane stays
  # proportional to the change. `--in-diff` is a cargo-mutants flag (StrykerJS has no
  # equivalent — the TS lane computes its diff scope itself, in tools/mutation-scope.mjs).
  # ---------------------------------------------------------------------------
  cargo-mutants:
    name: cargo-mutants (rust host)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install webkit build prerequisites (pinned apt list)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install pinned Rust toolchain (rust-toolchain.toml)
        run: rustup toolchain install

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install cargo-mutants (pinned)
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: cargo-mutants@27.1.0

      - name: Mutate the host crate
        shell: bash
        working-directory: apps/desktop/src-tauri
        run: cargo mutants --timeout 300 -- --locked

# Self-test: prove the installer + template produce a working, gate-green
# Tauri 2 + Hono + Postgres monorepo on every change. This matrix IS the
# release acceptance test. The canary job additionally proves every headline
# gate CAN fail — a gate that cannot go red is deleted.
name: selftest

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '30 3 * * *' # nightly full acceptance (incl. tauri-build-smoke)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: selftest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # Both unit lanes run on ubuntu AND windows: the v0.1.1 bug class (path
  # separators, CRLF, shell globbing) only reproduces on a real Windows
  # filesystem — a Linux-only unit lane cannot make that class extinct.
  installer-unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        # harden-runner egress blocking is unsupported on Windows (audit-only);
        # declaring audit everywhere keeps the two legs honest and identical.
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: node scripts/check-syntax.mjs
      - run: node scripts/hygiene.mjs
      - run: node scripts/check-release-lockstep.mjs
      - run: node scripts/check-plugin-manifest.mjs
      - run: node scripts/check-canary-coverage.mjs
      - run: node scripts/generate-floor.mjs --check
      # Coverage floor over the installer itself (measured ~92/73/94 at 0.1.3;
      # floors sit ~7 points under). Hooks are exercised as CHILD processes by
      # tests/hooks (out-of-process — not measurable here); their behavioral
      # floor is the hook-contract deny/allow matrix instead.
      - run: >-
          node --test --experimental-test-coverage
          --test-coverage-include='installer/**'
          --test-coverage-lines=85 --test-coverage-branches=65 --test-coverage-functions=85
          "tests/**/*.test.mjs"
      # Second floor over the TEMPLATE gate-support libs (template/base/tools/lib/**),
      # measured ~98/95/93 at 0.1.4 over the gate-logic tests; floors sit ~8-10
      # points under (installer convention). The gate SCRIPTS themselves
      # (tools/check-*.mjs) run as CHILD processes and are covered BEHAVIORALLY
      # by the canary red-proof closure (scripts/check-canary-coverage.mjs), not
      # by line coverage — a gate that cannot go red is deleted, which line
      # counting would not catch.
      - run: >-
          node --test --experimental-test-coverage
          --test-coverage-include='template/base/tools/lib/**'
          --test-coverage-lines=90 --test-coverage-branches=85 --test-coverage-functions=85
          "tests/gates/*.test.mjs"

  hook-contracts:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      # Includes the malformed-stdin fail-closed cases: guards must exit 2 on
      # unparseable hook input, never fail open.
      - run: node --test "tests/hooks/*.test.mjs"

  # One deliberate violation per gate DIRECTION; each must turn the matching
  # gate red on an otherwise-green scaffold. Baseline-pass first so a failure
  # is attributable to the injection, not to a broken fixture.
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Scaffold canary fixture (committed git baseline for the diff-based gates)
        run: |
          node installer/cli.mjs init --dir "$RUNNER_TEMP/canary" --yes \
            --set PROJECT_NAME="Canary App" \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner
          cd "$RUNNER_TEMP/canary"
          git init -q -b main
          git add -A
          git -c user.email=selftest@localhost -c user.name=selftest commit -qm 'scaffold baseline'
      - name: Baseline — all four canary gates PASS on the clean scaffold
        working-directory: ${{ runner.temp }}/canary
        run: |
          # GITHUB_BASE_REF belongs to the harness checkout, not this scaffold
          # repo — unset it so the migrations gate diffs against the scaffold's
          # own HEAD instead of a ref that does not exist here.
          env -u GITHUB_BASE_REF node tools/check-tauri-policy.mjs
          env -u GITHUB_BASE_REF node tools/check-migrations.mjs
          env -u GITHUB_BASE_REF node tools/check-sources.mjs
          env -u GITHUB_BASE_REF node tools/check-rls-manifest.mjs
      - name: 'Canary 1: weaken tauri.conf CSP to null → tauri-policy must FAIL'
        working-directory: ${{ runner.temp }}/canary
        run: |
          node -e 'const fs=require("node:fs");const f="apps/desktop/src-tauri/tauri.conf.json";const j=JSON.parse(fs.readFileSync(f,"utf8"));j.app.security.csp=null;fs.writeFileSync(f,JSON.stringify(j,null,2))'
          if env -u GITHUB_BASE_REF node tools/check-tauri-policy.mjs; then
            echo '::error::CANARY: tauri-policy PASSED with a null CSP — the gate cannot fail'; exit 1
          fi
          git checkout -q -- .
          echo 'canary OK: tauri-policy went red'
      - name: 'Canary 2: edit an existing migration → migrations must FAIL'
        working-directory: ${{ runner.temp }}/canary
        run: |
          echo 'ALTER TABLE notes ADD COLUMN sneaky text;' >> packages/schema/drizzle/0000_init.sql
          if env -u GITHUB_BASE_REF node tools/check-migrations.mjs; then
            echo '::error::CANARY: migrations PASSED after editing a committed migration — the gate cannot fail'; exit 1
          fi
          git checkout -q -- .
          echo 'canary OK: migrations went red'
      - name: 'Canary 3: strip SOURCE citations from decision sites → provenance must FAIL'
        working-directory: ${{ runner.temp }}/canary
        run: |
          sed -i '/SOURCE:/d' packages/schema/drizzle/0000_init.sql
          if env -u GITHUB_BASE_REF node tools/check-sources.mjs; then
            echo '::error::CANARY: provenance PASSED with uncited decision sites — the gate cannot fail'; exit 1
          fi
          git checkout -q -- .
          echo 'canary OK: provenance went red'
      - name: 'Canary 4: remove FORCE RLS from the migration → schema-rls must FAIL'
        working-directory: ${{ runner.temp }}/canary
        run: |
          sed -i '/FORCE ROW LEVEL SECURITY/d' packages/schema/drizzle/0000_init.sql
          if env -u GITHUB_BASE_REF node tools/check-rls-manifest.mjs; then
            echo '::error::CANARY: schema-rls PASSED without FORCE RLS — the gate cannot fail'; exit 1
          fi
          git checkout -q -- .
          echo 'canary OK: schema-rls went red'
      - name: 'Canary 5: raw hex + erased palette utility in a TSX → styleguide must FAIL'
        working-directory: ${{ runner.temp }}/canary
        run: |
          printf 'export const oops = <p className="text-red-500">bad #ff0000</p>\n' > apps/desktop/src/oops.tsx
          if env -u GITHUB_BASE_REF node tools/check-styleguide-manifest.mjs; then
            echo '::error::CANARY: styleguide PASSED raw hex + erased palette — the gate cannot fail'; exit 1
          fi
          rm apps/desktop/src/oops.tsx
          echo 'canary OK: styleguide went red'
      - name: 'Canary 6: unregistered features directory → route-manifest must FAIL'
        working-directory: ${{ runner.temp }}/canary
        run: |
          mkdir -p apps/desktop/src/features/reports
          echo 'export const x = 1' > apps/desktop/src/features/reports/index.ts
          if env -u GITHUB_BASE_REF node tools/check-route-manifest.mjs; then
            echo '::error::CANARY: route-manifest PASSED an unregistered screen dir — the gate cannot fail'; exit 1
          fi
          rm -r apps/desktop/src/features/reports
          echo 'canary OK: route-manifest went red'
      - name: 'Canary 7: tamper a hash-locked prompt → prompts must FAIL'
        working-directory: ${{ runner.temp }}/canary
        run: |
          echo ' ' >> packages/eval/prompts/extract.v1.md
          if env -u GITHUB_BASE_REF node tools/check-prompts-lock.mjs; then
            echo '::error::CANARY: prompts PASSED a tampered hash-locked prompt — the gate cannot fail'; exit 1
          fi
          git checkout -q -- .
          echo 'canary OK: prompts went red'
      - name: Restore sanity — gates green again after the last restore
        working-directory: ${{ runner.temp }}/canary
        run: env -u GITHUB_BASE_REF node tools/check-rls-manifest.mjs
      - name: Canary coverage lockstep (every step provably red; hook rules tested)
        run: node scripts/check-canary-coverage.mjs

  bootstrap-linux:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Tauri Linux build deps (pinned webkit/gtk apt list)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Bootstrap a fresh project from the template
        run: |
          node installer/cli.mjs init --dir "$GITHUB_WORKSPACE/.selftest/boot" --yes \
            --set PROJECT_NAME="Selftest App" \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner
      - name: Git baseline + corepack (lefthook prepare and the diff-based gates need a repo)
        working-directory: .selftest/boot
        run: |
          git init -q -b main
          git add -A
          git -c user.email=selftest@localhost -c user.name=selftest commit -qm 'scaffold baseline'
          corepack enable
          corepack prepare --activate
      # Resolving the store path is the cache CONFIG step: if it fails, the job
      # hard-fails here (cache config error), never silently uncached.
      - name: Resolve pnpm store path
        id: pnpm-store
        working-directory: .selftest/boot
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        id: pnpm-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('template/base/pnpm-workspace.yaml', 'template/**/package.json.tmpl') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-node${{ matrix.node }}-
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: .selftest/boot/apps/desktop/src-tauri
          cache-on-failure: true
      - name: Rust toolchain (installs the scaffold's rust-toolchain.toml pin)
        working-directory: .selftest/boot
        run: |
          rustup toolchain install
          rustup show
      - name: pnpm install
        working-directory: .selftest/boot
        run: pnpm install --no-frozen-lockfile
      - name: Playwright chromium (the e2e gate fails closed in CI without it)
        working-directory: .selftest/boot
        run: pnpm exec playwright install chromium --with-deps
      # Soft assertion: on a re-run with an unchanged catalog the store cache
      # should hit. A miss is a warning (first run / catalog bump are
      # legitimate); a cache CONFIG error already failed the job above.
      - name: Assert pnpm store cache effectiveness
        if: steps.pnpm-cache.outputs.cache-hit != 'true'
        run: echo "::warning title=pnpm store cache miss::⚠ pnpm store cache missed (key pnpm-store-${RUNNER_OS}-node${NODE_MAJOR}-…). Expected on the first run after a catalog change; investigate if this repeats on unchanged re-runs."
        env:
          NODE_MAJOR: ${{ matrix.node }}
      - name: THE GATE — full validate must be green out of the box (CI floor, rust for real)
        working-directory: .selftest/boot
        env:
          HARNESS_REQUIRE_TOOLCHAINS: '1'
        run: node tools/validate.mjs --min-floor
      - name: Warm validate wall-time budget (stamped local experience — fail >120s, warn >90s)
        working-directory: .selftest/boot
        env:
          # CI=false so stamps + caches apply: this measures the LOCAL warm
          # experience an agent gets between edits, not the fail-closed CI run
          # (which just happened above). Stamps were recorded by the cold run.
          CI: 'false'
          HARNESS_REQUIRE_TOOLCHAINS: ''
        run: |
          start=$(date +%s)
          node tools/validate.mjs | tee warm-validate.log
          elapsed=$(( $(date +%s) - start ))
          echo "warm validate wall time: ${elapsed}s"
          {
            echo '### Warm validate (stamped) — per-step ms'
            echo '```'
            grep -E '^  ' warm-validate.log || true
            echo '```'
            echo "wall time: ${elapsed}s"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$elapsed" -gt 120 ]; then echo "::error::warm validate took ${elapsed}s (budget 120s)"; exit 1; fi
          if [ "$elapsed" -gt 90 ]; then echo "::warning::warm validate took ${elapsed}s (target 90s)"; fi
      - name: Warm-lane positive control — the e2e stamp engaged (skipped the browser run)
        working-directory: .selftest/boot
        # The cold --min-floor run above recorded .harness/e2e.ok; the warm run must
        # then short-circuit e2e via that stamp instead of re-running Playwright. A
        # green warm log WITHOUT this line means the biggest warm-path win silently
        # regressed, so fail closed on its absence.
        run: |
          if grep -E '^e2e: OK.*inputs unchanged' warm-validate.log; then
            echo 'e2e stamp engaged on the warm run: OK'
          else
            echo '::error::warm validate did not skip e2e via its stamp — the warm-path win regressed'
            exit 1
          fi
      # The CI-only interaction-latency lane (quality-gate perf-lane in consumer
      # repos): green on the clean scaffold, then provably able to fail — a
      # 300ms keydown busy loop injected into the scaffold must red it. One leg
      # only: the lane is wall-clock, so the node-24 duplicate adds noise, not
      # coverage. Lives here (not tests/canary/injections.json) because the perf
      # lane is NOT a VALIDATE_STEPS/STOP_HOOK_STEPS member — check-canary-coverage
      # rejects registry entries for non-chain steps by design.
      - name: Perf lane GREEN on the clean scaffold (interaction-latency budgets)
        if: matrix.node == 22
        working-directory: .selftest/boot
        env:
          HARNESS_PERF_LANE: '1'
        run: pnpm exec playwright test --project perf --workers 1
      - name: 'Perf-lane canary: a 300ms keydown busy loop must RED the lane'
        if: matrix.node == 22
        working-directory: .selftest/boot
        env:
          HARNESS_PERF_LANE: '1'
        run: |
          cat >> apps/desktop/src/main.tsx <<'EOF'

          // selftest perf canary: block the main thread 300ms on every keydown —
          // the interaction-latency lane must catch exactly this class of stall.
          window.addEventListener(
            'keydown',
            () => {
              const blockUntil = performance.now() + 300
              while (performance.now() < blockUntil) {
                // spin
              }
            },
            true,
          )
          EOF
          if pnpm exec playwright test --project perf --workers 1 > perf-canary.log 2>&1; then
            tail -n 50 perf-canary.log
            echo '::error::PERF CANARY: the lane PASSED with a 300ms main-thread busy loop on every keydown — the perf lane cannot fail'
            exit 1
          fi
          grep -E 'long task|latency' perf-canary.log | tail -n 5 || true
          git checkout -q -- apps/desktop/src/main.tsx
          echo 'canary OK: perf lane went red under the injected busy loop'
      # The MEMORY half of the perf lane (v0.1.6). The signal is a live count of listeners
      # on window/document — the targets that outlive every component — sampled after a
      # forced GC across a navigate-and-back loop through the app's own router. Calibrated:
      # a correct tree grows by 0, one un-removed listener per mount grows by 16 over 8
      # cycles. (CDP's own JSEventListeners/Nodes/JSHeapUsedSize counters were tried first
      # and DID NOT MOVE on this exact injection — see e2e/memory.spec.ts. That is why they
      # are not what this asserts, and why this canary exists: a leak check nobody has ever
      # seen go red is indistinguishable from no leak check at all.)
      - name: 'Memory-lane canary: an effect that registers a listener and never removes it must RED the lane'
        if: matrix.node == 22
        working-directory: .selftest/boot
        env:
          HARNESS_PERF_LANE: '1'
        run: |
          # A screen-level effect (HomeScreen mounts and unmounts on every cycle) that
          # subscribes to window and returns no cleanup — the canonical React leak.
          node -e '
            const fs = require("node:fs");
            const f = "apps/desktop/src/screens/HomeScreen.tsx";
            let s = fs.readFileSync(f, "utf8");
            s = s.replace(/(export function HomeScreen\(\)[^{]*\{\n)/,
              "$1  useEffect(() => {\n    const onKey = () => undefined\n    window.addEventListener('keydown', onKey)\n  }, [])\n");
            fs.writeFileSync(f, s);
          '
          if pnpm exec playwright test --project perf --workers 1 > memory-canary.log 2>&1; then
            tail -n 50 memory-canary.log
            echo '::error::MEMORY CANARY: the lane PASSED while every HomeScreen mount leaked a window listener — the memory ceiling cannot fail'
            exit 1
          fi
          grep -E 'LISTENER LEAK|window:keydown' memory-canary.log | tail -n 5 || true
          git checkout -q -- apps/desktop/src/screens/HomeScreen.tsx
          echo 'canary OK: memory lane went red under the injected listener leak'
      - name: "Canary 8: replace a route's EmptyState with a bare-word div, or its Skeleton with a silent spinner, or a route panel wider than the 640px min window, or remove the :focus-visible outline → the e2e lane (states/reflow/a11y quality checks, all iterating ROUTES) must FAIL"
        if: matrix.node == 22
        working-directory: .selftest/boot
        run: |
          # G20: gut the home route's EmptyState down to a bare-word div. The states
          # quality check drives the REAL render, so "empty == a single label" must red —
          # a manifest-satisfying but below-tier surface can no longer ship green.
          node -e '
            const fs = require("node:fs");
            const f = "apps/desktop/src/features/notes/NotesPanel.tsx";
            let s = fs.readFileSync(f, "utf8");
            s = s.replace(/<EmptyState\s+data-testid=\{HOME\.states\.empty\}[\s\S]*?\/>/, "<div data-testid={HOME.states.empty}>None</div>");
            fs.writeFileSync(f, s);
          '
          # The change invalidates the e2e stamp (desktop src hash moved), so the gate
          # re-runs the browser suite instead of short-circuiting.
          if env -u GITHUB_BASE_REF node tools/check-e2e.mjs > e2e-canary.log 2>&1; then
            tail -n 50 e2e-canary.log
            echo '::error::E2E CANARY: the lane PASSED with a bare-word empty state — the route-state quality check cannot fail'
            exit 1
          fi
          grep -E 'title AND a description|EmptyState' e2e-canary.log | tail -n 5 || true
          git checkout -q -- apps/desktop/src/features/notes/NotesPanel.tsx
          echo 'canary OK: e2e lane went red on a below-tier empty state'
      - name: RLS runner FAILS CLOSED without a database (CI=true)
        working-directory: .selftest/boot
        run: |
          # Doctrine: with migrations present and no reachable Postgres, a CI
          # skip would be a false green on the headline isolation gate.
          if CI=true node tests/rls/run-rls.mjs > rls-fail.log 2>&1; then
            echo '::error::expected fail-closed without a database, got green'
            cat rls-fail.log
            exit 1
          fi
          grep -q 'failing closed' rls-fail.log
          echo 'fail-closed proof: OK'
      - name: Start the scaffold's pinned pgvector database
        working-directory: .selftest/boot
        run: docker compose up -d --wait db
      - name: RLS isolation suite runs for real and is green
        working-directory: .selftest/boot
        run: |
          set -o pipefail
          CI=true node tests/rls/run-rls.mjs 2>&1 | tee rls.log
          # Positive control: prove the DB-backed branch ran (fresh-apply), not
          # a polite self-skip that would false-green a real leak.
          grep -q '\[migrations\] OK' rls.log \
            || { echo '::error::RLS suite did not fresh-apply migrations against the live database'; exit 1; }
          grep -q '\[rls\] OK' rls.log \
            || { echo '::error::RLS suite did not complete green'; exit 1; }
      # Canary 9 (v0.1.6): the DAL plan probe. Until 0.1.6 the plan probe EXPLAINed one
      # HAND-WRITTEN statement — `SELECT * FROM notes` — and asserted only "not a Seq Scan".
      # It was green for five releases while the query the app ACTUALLY issues (a keyset
      # seek with an ORDER BY) sorted the owner's entire partition on every page and demoted
      # the row-value cursor from an Index Cond to a Filter. Deleting the composite keyset
      # index returns the schema to exactly that state, so this proves the probe now sees
      # what it could not see then — and, critically, that it is looking at the DAL's real
      # SQL rather than at a statement nobody runs.
      - name: 'Canary 9: drop the keyset index → the DAL plan probe must FAIL (a Sort over the owner partition)'
        working-directory: .selftest/boot
        run: |
          rm packages/schema/drizzle/0002_notes_keyset_idx.sql
          node -e '
            const fs = require("node:fs");
            const p = "packages/schema/drizzle/meta/_journal.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            j.entries = j.entries.filter((e) => e.tag !== "0002_notes_keyset_idx");
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          '
          if CI=true node tests/rls/run-rls.mjs > plan-canary.log 2>&1; then
            tail -n 60 plan-canary.log
            echo '::error::PLAN CANARY: the RLS suite PASSED with only the (owner_id) index — the DAL plan probe cannot see a whole-partition Sort, which is the exact defect it exists to catch'
            exit 1
          fi
          grep -E "forbidden plan node|Sort|notesDal.list" plan-canary.log | tail -n 6 || true
          # The bare-policy probe MUST still be green in that log: it is the proof that the
          # old check structurally could not see this, which is the whole point of the new one.
          grep -q 'policy shape' plan-canary.log \
            || { echo '::error::the policy-shape probe did not run — cannot demonstrate what the old check missed'; exit 1; }
          git checkout -q -- packages/schema/drizzle/
          echo 'canary OK: the DAL plan probe went red on the v0.1.5 index, while the old policy probe stayed green'

  # ---------------------------------------------------------------------------
  # EVERY MODULE'S CODE ACTUALLY COMPILES AND PASSES.
  #
  # bootstrap-linux scaffolds with the DEFAULT tier, which installs 2 of the 10 modules
  # (ci-provenance, ci-windows-release — and both are workflow YAML, not code). So until
  # 0.1.6, EIGHT modules' source had never been typechecked, linted, or executed by the
  # harness's own CI. Not once. The `--tier strict` path was documented, offered by the
  # installer, and verified by nothing.
  #
  # It shipped exactly the defects you would predict:
  #   • observability's fake NotesDal still returned `[]` after list() became a keyset page
  #     ({ items, nextCursor }) — `tsc -b` RED on any install that enabled the module.
  #   • gate-a11y-deep computed "has an accessible name" from textContent || aria-label ||
  #     title. An <input> is a void element, so its textContent is ALWAYS '' — the check could
  #     never pass a correctly labelled input, and reddened on the harness's own Field
  #     primitive. Worse, the only way to satisfy it was to add a redundant aria-label, which
  #     OVERRIDES the visible label: the "fix" it pushed you toward was a real a11y regression.
  #
  # Both are the same bug: code nobody ran. This job is the fix — it installs EVERY module and
  # puts the whole surface through the real gate. Deliberately narrower than bootstrap-linux
  # (no perf lane, no canary sweep, node 22 only): those prove the default scaffold's
  # BEHAVIOUR, this proves the module surface COMPILES AND PASSES. Adding a module now means
  # adding it to something that runs.
  # ---------------------------------------------------------------------------
  bootstrap-strict:
    name: strict tier (every module installed) — the whole surface must compile and pass
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Tauri Linux build deps (pinned webkit/gtk apt list)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Bootstrap a fresh project at --tier strict (ALL modules)
        run: |
          node installer/cli.mjs init --dir "$GITHUB_WORKSPACE/.selftest/strict" --yes \
            --tier strict \
            --set PROJECT_NAME="Selftest Strict" \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner
      # ANTI-VACUITY. If `--tier strict` silently planted nothing, every gate below would pass
      # for the wrong reason and this job would certify an empty surface. Assert each module's
      # CODE (not its docs) is on disk before anything is allowed to go green.
      - name: Positive control — every module's code is actually on disk
        working-directory: .selftest/strict
        run: |
          missing=0
          for f in \
            apps/server/src/observability/span-routes.test.ts \
            apps/server/src/crash/redact.ts \
            packages/eval/src/adapters/live.ts \
            e2e/a11y-deep.spec.ts \
            e2e-windows/smoke.e2e.ts \
            tests/rls/hitl-transition-matrix.test.ts \
            tools/check-mutation-ratchet.mjs \
            tools/check-eval-disjoint.mjs \
            tools/check-notices.mjs ; do
            if [ ! -f "$f" ]; then echo "::error::strict tier did NOT install $f"; missing=1; fi
          done
          [ "$missing" = 0 ] || { echo '::error::--tier strict planted no module code — this job would have certified an empty surface'; exit 1; }
          echo 'positive control OK: every module surface is present and about to be gated'
      - name: Git baseline + corepack
        working-directory: .selftest/strict
        run: |
          git init -q -b main
          git add -A
          git -c user.email=selftest@localhost -c user.name=selftest commit -qm 'strict scaffold baseline'
          corepack enable
          corepack prepare --activate
      - name: Resolve pnpm store path
        id: pnpm-store
        working-directory: .selftest/strict
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-node22-${{ hashFiles('template/base/pnpm-workspace.yaml', 'template/**/package.json.tmpl') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-node22-
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: .selftest/strict/apps/desktop/src-tauri
          cache-on-failure: true
      - name: Rust toolchain (installs the scaffold's rust-toolchain.toml pin)
        working-directory: .selftest/strict
        run: |
          rustup toolchain install
          rustup show
      - name: pnpm install
        working-directory: .selftest/strict
        run: pnpm install --no-frozen-lockfile
      - name: Playwright chromium (the e2e gate fails closed in CI without it)
        working-directory: .selftest/strict
        run: pnpm exec playwright install chromium --with-deps
      # `types` catches the observability class; `lint` and `e2e` catch the a11y-deep class.
      - name: THE GATE — full validate must be green with every module installed
        working-directory: .selftest/strict
        env:
          HARNESS_REQUIRE_TOOLCHAINS: '1'
        run: node tools/validate.mjs --min-floor
      - name: Unit suite (module tests run for real, under the coverage floors)
        working-directory: .selftest/strict
        run: pnpm exec vitest run --coverage --silent
      # The Windows E2E module's specs are transpiled by WDIO at run time and are NOT part of
      # the root `tsc -b` solution, so the `types` gate never sees them. They ARE
      # type-aware-linted through their own tsconfig (typescript-eslint's projectService
      # discovers it) — but only when the module is installed, which is to say: only here.
      - name: Windows E2E module specs typecheck standalone
        working-directory: .selftest/strict
        run: pnpm exec tsc -p e2e-windows --noEmit

  # The product promise: a stock Windows runner bootstraps to a green gate.
  # Runs on EVERY PR — Windows is the ship target, not a nightly afterthought.
  bootstrap-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Verify rustup is preinstalled on windows-latest
        run: |
          command -v rustup || { echo '::error::rustup missing on windows-latest — add an install step'; exit 1; }
          rustup --version
      - name: Bootstrap a fresh project from the template
        run: |
          node installer/cli.mjs init --dir "$GITHUB_WORKSPACE/.selftest/boot" --yes \
            --set PROJECT_NAME="Selftest App" \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner
      - name: Manifest is POSIX-keyed and lifecycle commands work on Windows
        run: |
          node -e '
            const { readFileSync } = require("node:fs");
            const m = JSON.parse(readFileSync(process.env.GITHUB_WORKSPACE + "/.selftest/boot/.harness/manifest.json", "utf8"));
            const bad = Object.keys(m.files).filter((k) => k.includes("\\"));
            if (bad.length) { console.error("backslash manifest keys:", bad.slice(0, 5)); process.exit(1); }
            const mode = m.files["apps/desktop/src-tauri/tauri.conf.json"].mode;
            if (mode !== "seeded") { console.error("tauri.conf.json mode", mode, "!== seeded - prefix rules broken on Windows"); process.exit(1); }
          '
          node installer/cli.mjs doctor --dir "$GITHUB_WORKSPACE/.selftest/boot"
          node installer/cli.mjs update --dir "$GITHUB_WORKSPACE/.selftest/boot" --dry-run
      - name: Git baseline + corepack
        working-directory: .selftest/boot
        run: |
          git init -q -b main
          git add -A
          git -c user.email=selftest@localhost -c user.name=selftest commit -qm 'scaffold baseline'
          corepack enable
          corepack prepare --activate
      - name: Resolve pnpm store path
        id: pnpm-store
        working-directory: .selftest/boot
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-node22-${{ hashFiles('template/base/pnpm-workspace.yaml', 'template/**/package.json.tmpl') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-node22-
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: .selftest/boot/apps/desktop/src-tauri
          cache-on-failure: true
      - name: Rust toolchain (installs the scaffold's rust-toolchain.toml pin)
        working-directory: .selftest/boot
        run: |
          rustup toolchain install
          rustup show
      - name: pnpm install
        working-directory: .selftest/boot
        run: pnpm install --no-frozen-lockfile
      - name: Playwright chromium (the e2e gate fails closed in CI without it)
        working-directory: .selftest/boot
        run: pnpm exec playwright install chromium
      - name: THE GATE — full validate on Windows (fail-closed toolchains)
        working-directory: .selftest/boot
        env:
          HARNESS_REQUIRE_TOOLCHAINS: '1'
        run: node tools/validate.mjs --min-floor
      - name: Warm validate wall-time (Windows runners are slow — warn-only)
        working-directory: .selftest/boot
        shell: bash
        env:
          CI: 'false'
          HARNESS_REQUIRE_TOOLCHAINS: ''
        run: |
          start=$(date +%s)
          node tools/validate.mjs | tee warm-validate.log
          elapsed=$(( $(date +%s) - start ))
          echo "warm validate wall time: ${elapsed}s"
          {
            echo '### Warm validate on Windows (stamped) — per-step ms'
            echo '```'
            grep -E '^  ' warm-validate.log || true
            echo '```'
            echo "wall time: ${elapsed}s"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$elapsed" -gt 120 ]; then echo "::warning::warm validate took ${elapsed}s (budget 120s; warn-only on Windows)"; fi
      - name: Unit tests green (Stop-hook step 3)
        working-directory: .selftest/boot
        run: pnpm exec vitest run --coverage --silent

  # Path filter feeding tauri-build-smoke: the full NSIS bundle is expensive,
  # so it runs when the desktop surface changes, on demand, nightly, and on
  # release tags.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: filter
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            desktop:
              - 'template/stack/apps/desktop/**'
              - 'template/base/rust-toolchain.toml'
              - 'template/base/pnpm-workspace.yaml'
              - 'installer/**'
              # the smoke job's own definition and checkout line-ending rules
              # affect its result — edits to either must re-run it
              - '.github/workflows/selftest.yml'
              - '.gitattributes'

  tauri-build-smoke:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.ref_type == 'tag' ||
      needs.changes.outputs.desktop == 'true'
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Bootstrap smoke fixture
        run: |
          node installer/cli.mjs init --dir "$GITHUB_WORKSPACE/.selftest/smoke" --yes \
            --set PROJECT_NAME=SmokeApp \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner
          cd "$GITHUB_WORKSPACE/.selftest/smoke"
          git init -q -b main
          git add -A
          git -c user.email=selftest@localhost -c user.name=selftest commit -qm 'scaffold baseline'
          corepack enable
          corepack prepare --activate
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: .selftest/smoke/apps/desktop/src-tauri
          cache-on-failure: true
      - name: Rust toolchain (installs the scaffold's rust-toolchain.toml pin)
        working-directory: .selftest/smoke
        run: |
          rustup toolchain install
          rustup show
      - name: pnpm install
        working-directory: .selftest/smoke
        run: pnpm install --no-frozen-lockfile
      - name: Build debug NSIS bundle
        working-directory: .selftest/smoke
        run: pnpm --filter desktop exec tauri build --debug
      - name: Assert installer artifact exists + size budget (fail >250MB, warn >180MB)
        shell: pwsh
        working-directory: .selftest/smoke
        run: |
          $exe = Get-ChildItem -Path 'apps/desktop/src-tauri/target/debug/bundle/nsis' -Filter '*-setup.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Get-ChildItem -Recurse 'apps/desktop/src-tauri/target/debug/bundle' -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            Write-Error 'tauri build produced no NSIS *-setup.exe'
            exit 1
          }
          $mb = [math]::Round($exe.Length / 1MB, 1)
          Write-Host "installer artifact: $($exe.Name) — $mb MB"
          if ($mb -gt 250) { Write-Error "installer is $mb MB — exceeds the 250 MB hard budget"; exit 1 }
          elseif ($mb -gt 180) { Write-Host "::warning title=installer size::⚠ installer is $mb MB (soft budget is 180 MB; offline WebView2 is the usual driver)" }
          "SMOKE_EXE=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Silent install /S to a temp prefix, assert installed files, uninstall cleanly
        shell: pwsh
        run: |
          $prefix = Join-Path $env:RUNNER_TEMP 'smoke-install'
          Start-Process -FilePath $env:SMOKE_EXE -ArgumentList '/S', "/D=$prefix" -Wait
          # Tauri 2 names the installed binary after the Cargo bin (desktop.exe),
          # not productName — assert on "an app exe that isn't the uninstaller".
          $app = Get-ChildItem -Path $prefix -Filter '*.exe' -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notlike 'uninstall*' } | Select-Object -First 1
          if (-not $app) {
            Get-ChildItem -Recurse $prefix -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            Write-Error "silent install left no app .exe under $prefix"
            exit 1
          }
          Write-Host "installed app binary: $($app.Name)"
          $app = $app.FullName
          $un = Get-ChildItem -Path $prefix -Filter 'uninstall*.exe' | Select-Object -First 1
          if (-not $un) { Write-Error 'no uninstaller in the install prefix'; exit 1 }
          Start-Process -FilePath $un.FullName -ArgumentList '/S' -Wait
          # NSIS uninstallers hand off to a temp copy and return early — poll.
          $deadline = (Get-Date).AddSeconds(90)
          while ((Test-Path $app) -and ((Get-Date) -lt $deadline)) { Start-Sleep -Seconds 3 }
          if (Test-Path $app) { Write-Error 'silent uninstall left the app binary behind'; exit 1 }
          Write-Host 'install/uninstall roundtrip: OK'

  retrofit:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Synthesize an existing pnpm monorepo with planted conflicts
        run: |
          mkdir -p "$RUNNER_TEMP/retro/apps/server/src" "$RUNNER_TEMP/retro/.claude"
          cat > "$RUNNER_TEMP/retro/package.json" <<'EOF'
          {"name":"existing","dependencies":{"hono":"^4.0.0"},"scripts":{"validate":"my-own-gate"}}
          EOF
          printf "# their workspace\npackages:\n  - 'apps/*'\n" > "$RUNNER_TEMP/retro/pnpm-workspace.yaml"
          echo 'export default []' > "$RUNNER_TEMP/retro/eslint.config.mjs"
          echo '{"name":"server"}' > "$RUNNER_TEMP/retro/apps/server/package.json"
          echo 'export const theirs = true' > "$RUNNER_TEMP/retro/apps/server/src/index.ts"
          printf '# THEIR project memory\n' > "$RUNNER_TEMP/retro/AGENTS.md"
          printf '{"permissions":{"allow":["Bash(make test)"],"defaultMode":"default"}}\n' > "$RUNNER_TEMP/retro/.claude/settings.json"
      - name: Retrofit install (JSON report; conflicts exit 2 by design)
        run: |
          node installer/cli.mjs init --dir "$RUNNER_TEMP/retro" --yes --report json \
            --set PROJECT_NAME="Retro App" \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner > "$RUNNER_TEMP/report.json" || true
      - name: Assert non-clobber semantics + workspace MERGE (not suffix)
        run: |
          node - "$RUNNER_TEMP" <<'EOF'
          const fs = require('node:fs')
          const [tmp] = process.argv.slice(2)
          const report = JSON.parse(fs.readFileSync(`${tmp}/report.json`, 'utf8'))
          const pkg = JSON.parse(fs.readFileSync(`${tmp}/retro/package.json`, 'utf8'))
          if (pkg.scripts.validate !== 'my-own-gate') throw new Error('clobbered their validate script')
          if (pkg.scripts['harness:validate'] !== 'node tools/validate.mjs') throw new Error('missing harness:validate')
          if (fs.readFileSync(`${tmp}/retro/eslint.config.mjs`, 'utf8') !== 'export default []\n') throw new Error('clobbered their eslint config')
          if (!fs.existsSync(`${tmp}/retro/eslint.config.harness.mjs`)) throw new Error('missing harness eslint sibling')
          const ws = fs.readFileSync(`${tmp}/retro/pnpm-workspace.yaml`, 'utf8')
          if (!ws.startsWith('# their workspace')) throw new Error('workspace yaml header not preserved (clobbered?)')
          if (!ws.includes("- 'apps/*'")) throw new Error('their workspace glob lost in merge')
          if (!ws.includes("- 'packages/*'")) throw new Error('harness workspace glob not unioned in')
          if (!ws.includes('catalog:')) throw new Error('harness catalog not merged in')
          if (fs.existsSync(`${tmp}/retro/pnpm-workspace.harness.yaml`)) throw new Error('workspace yaml was suffixed instead of merged')
          if (fs.readFileSync(`${tmp}/retro/apps/server/src/index.ts`, 'utf8') !== 'export const theirs = true\n') throw new Error('their app code modified')
          if (fs.existsSync(`${tmp}/retro/apps/desktop`)) throw new Error('stack app code installed on retrofit')
          if (!report.conflicts?.length) throw new Error('conflict report empty — planted conflicts not surfaced')
          if (fs.readFileSync(`${tmp}/retro/AGENTS.md`, 'utf8') !== '# THEIR project memory\n') throw new Error('clobbered their AGENTS.md')
          if (!fs.existsSync(`${tmp}/retro/.harness/conflicts/AGENTS.md`)) throw new Error('harness AGENTS.md not parked as a conflict')
          const settings = JSON.parse(fs.readFileSync(`${tmp}/retro/.claude/settings.json`, 'utf8'))
          if (settings.permissions.defaultMode !== 'default') throw new Error('clobbered their permission posture')
          if (!JSON.stringify(settings.hooks ?? {}).includes('stop-validate-gate')) throw new Error('harness Stop hook not merged into their settings')
          console.log('retrofit non-clobber + workspace merge: OK')
          EOF

  # A project installed from the PREVIOUS release must upgrade cleanly with the
  # CURRENT installer: version migrations apply, doctor is not broken, and the
  # local step list matches the CI floor (a promoted gate that reaches CI but
  # not the consumer's Stop hook is a silent lockstep break).
  update-skew:
    # The previous-release legs run on ubuntu only: Windows adds no
    # path-separator coverage the installer-unit matrix lacks, and a second OS
    # here would multiply an already-expensive checkout+worktree lane.
    strategy:
      fail-fast: false
      matrix:
        previous: [v0.1.1, v0.1.3, v0.1.4]
    runs-on: ubuntu-latest
    env:
      PREVIOUS_RELEASE_TAG: ${{ matrix.previous }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Init from the previous release tag
        run: |
          git worktree add "$RUNNER_TEMP/old-harness" "$PREVIOUS_RELEASE_TAG"
          node "$RUNNER_TEMP/old-harness/installer/cli.mjs" init --dir "$RUNNER_TEMP/skew" --yes \
            --set PROJECT_NAME="Skew App" \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner
      - name: Update with the CURRENT installer
        run: |
          node installer/cli.mjs update --dir "$RUNNER_TEMP/skew" || code=$?
          # exit 2 (drift parked for human review) is acceptable; 1 is broken.
          if [ "${code:-0}" -eq 1 ]; then
            echo '::error::update from the previous release failed'
            exit 1
          fi
      - name: Doctor is not broken after the upgrade
        run: |
          node installer/cli.mjs doctor --dir "$RUNNER_TEMP/skew" || code=$?
          if [ "${code:-0}" -eq 1 ]; then
            echo '::error::doctor reports a BROKEN install after upgrade'
            exit 1
          fi
      - name: Local step list matches the CI floor (FLOOR ↔ VALIDATE_STEPS lockstep survives upgrade)
        working-directory: ${{ runner.temp }}/skew
        run: |
          node tools/validate.mjs --list > /tmp/local-steps.txt
          node tools/validate.mjs --min-floor --list > /tmp/floor-steps.txt
          if ! diff -u /tmp/floor-steps.txt /tmp/local-steps.txt; then
            echo '::error::upgraded install runs different steps locally than CI --min-floor'
            exit 1
          fi
          echo 'step-list parity after upgrade: OK'
      # v0.1.3 leg ONLY: an upgraded 0.1.3 consumer's route closure must stay
      # green (exit 0). This is the proof that seedOnInitOnly withheld the new
      # features/matrix + screens exemplars — planting them would red
      # route-manifest on the consumer's next validate (unregistered feature
      # dir). A pre-0.1.3 consumer predates the whole UI surface and needs
      # documented manual reconciliation, so the v0.1.1 leg keeps only the
      # doctor/parity asserts above and runs no gate checks.
      - name: Route closure holds after upgrade (v0.1.3 → current; proves seedOnInitOnly)
        if: matrix.previous == 'v0.1.3'
        working-directory: ${{ runner.temp }}/skew
        run: node tools/check-route-manifest.mjs
      # v0.1.4 leg ONLY, and further than the older legs: the FULL "update never
      # reds a clean consumer" invariant. A clean previous-release install,
      # upgraded by the CURRENT installer, must still run an entirely green
      # `node tools/validate.mjs` after `pnpm install`. Toolchain footprint
      # stays this job's (node + pnpm, no cargo/docker/chromium): with CI=false
      # the rust/e2e gates SKIP LOUDLY exactly as they would on a consumer's
      # machine, and the FAIL-grep below proves a skip can never mask a red.
      - name: Git baseline + corepack (v0.1.4 leg; diff-based gates and lefthook prepare need a repo)
        if: matrix.previous == 'v0.1.4'
        working-directory: ${{ runner.temp }}/skew
        run: |
          git init -q -b main
          git add -A
          git -c user.email=selftest@localhost -c user.name=selftest commit -qm 'skew baseline'
          corepack enable
          corepack prepare --activate
      - name: pnpm install in the upgraded consumer (v0.1.4 leg)
        if: matrix.previous == 'v0.1.4'
        working-directory: ${{ runner.temp }}/skew
        run: pnpm install --no-frozen-lockfile
      - name: Full validate stays green after upgrade (update never reds a clean 0.1.4 consumer)
        if: matrix.previous == 'v0.1.4'
        working-directory: ${{ runner.temp }}/skew
        env:
          # CI=false mirrors the local consumer experience this invariant
          # protects: toolchain-dependent gates skip loudly instead of failing
          # closed (this job deliberately installs none of those toolchains).
          CI: 'false'
          HARNESS_REQUIRE_TOOLCHAINS: ''
        run: |
          # Deterministic toolchain surface: runner images flip-flop on shipping
          # cargo, and a half-present one (no webkit sysdeps) would red the leg
          # for reasons unrelated to `update` — while the rust gates only verify
          # SEEDED sources update never touches, so their verdict cannot change
          # across an upgrade. Mask cargo so those gates take their documented
          # loud-skip path on every image; the exit code + FAIL-grep still hold
          # every other gate to a real green.
          mkdir -p "$RUNNER_TEMP/no-cargo"
          printf '#!/bin/sh\nexit 127\n' > "$RUNNER_TEMP/no-cargo/cargo"
          chmod +x "$RUNNER_TEMP/no-cargo/cargo"
          export PATH="$RUNNER_TEMP/no-cargo:$PATH"
          set -o pipefail
          node tools/validate.mjs 2>&1 | tee validate-skew.log
          # Belt and braces: no line may carry the gate-FAIL format, so a loud
          # SKIP (or a buggy exit-code path) can never mask a real red.
          if grep -E '^[a-z0-9-]+: FAIL' validate-skew.log; then
            echo '::error::a gate reported FAIL inside the upgraded 0.1.4 consumer validate'
            exit 1
          fi
          echo 'update-never-reds-a-clean-consumer invariant: OK'

  # seedOnInitOnly completeness: a template file newly ADDED since the previous
  # release that installs as seeded/config content MUST be registered in
  # template/migrations.json (or be a reviewed deliberate plant) — otherwise the
  # next `update` auto-plants it into existing installs and reds route-manifest
  # + dead-code there. Machine-enforces what the update-skew legs can only
  # spot-check for paths that already shipped.
  seeded-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # The gate diffs against the previous release tag and fails loudly
          # when no tag is reachable — a shallow clone would trip that on purpose.
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: node scripts/check-seeded-migrations.mjs

  placeholder-residue:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Bootstrap and scan for unrendered placeholders (shared scanner)
        run: |
          node installer/cli.mjs init --dir "$RUNNER_TEMP/residue" --yes \
            --set PROJECT_NAME="Residue App" \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner
          node scripts/check-residue.mjs "$RUNNER_TEMP/residue"

  # Every opt-in module renders, placeholder-clean and syntax-valid, on one
  # scaffold — a module with broken packaging or leaked placeholders is dead on
  # arrival for the first consumer who enables it. (Module workflow YAML is
  # actionlinted by lint.yml against the raw template files.)
  module-render:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Render the scaffold with EVERY module enabled
        run: |
          node installer/cli.mjs init --dir "$RUNNER_TEMP/allmods" --yes --tier core \
            --set PROJECT_NAME="All Modules" \
            --set GITHUB_OWNER=selftest-owner \
            --set SECURITY_OWNERS=@selftest-owner
          for m in ci-windows-release ci-windows-e2e ci-macos ci-provenance mutation \
                   gate-a11y-deep crash-reporting ops-backup eval-live observability; do
            node installer/cli.mjs enable "$m" --dir "$RUNNER_TEMP/allmods"
          done
      - name: Rendered tree is placeholder-clean and syntax-valid
        run: |
          node scripts/check-residue.mjs "$RUNNER_TEMP/allmods"
          node scripts/check-syntax.mjs "$RUNNER_TEMP/allmods"
      - name: Doctor accepts the all-modules install
        run: |
          if node installer/cli.mjs doctor --dir "$RUNNER_TEMP/allmods"; then
            echo 'doctor: clean'
          else
            code=$?
            if [ "$code" -eq 1 ]; then echo '::error::doctor reports BROKEN on a fresh all-modules install'; exit 1; fi
            echo "doctor exit $code (warnings only) — acceptable on a fresh render"
          fi

# mutation module — mutation testing across BOTH languages. The full StrykerJS run
# is SLOW: nightly cron + manual dispatch only, never a per-PR gate. Per-PR jobs are
# incremental and ADVISORY (continue-on-error) until a measured run confirms the
# thresholds hold — then remove continue-on-error to make them blocking:
#   - mutation-incremental: StrykerJS on the critical TS modules (break >= 80)
#   - cargo-mutants-diff: cargo-mutants restricted to the PR's Rust diff
# Prereq: pnpm add -D -w @stryker-mutator/core @stryker-mutator/vitest-runner
# SOURCE: docs/harness/gates-catalog.md (mutation module)
name: mutation

on:
  pull_request:
  schedule:
    # Nightly full run. 03:17 UTC.
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Full-library net: every TS mutant. Nightly/manual only; measures, never breaks.
  # ---------------------------------------------------------------------------
  mutation-full:
    name: stryker (nightly full)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mutation testing (StrykerJS, full)
        run: pnpm exec stryker run stryker.config.mjs

  # ---------------------------------------------------------------------------
  # Per-PR incremental StrykerJS on the CRITICAL modules only. ADVISORY until a
  # measured run confirms >= 80% — then remove continue-on-error.
  # ---------------------------------------------------------------------------
  mutation-incremental:
    name: stryker incremental (critical modules — advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so Stryker's incremental diff can resolve the base.
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Incremental mutation (critical modules, break >= 80)
        run: pnpm exec stryker run stryker.incremental.mjs

  # ---------------------------------------------------------------------------
  # Rust host: cargo-mutants restricted to this PR's diff — mutants only where the
  # PR touched code, so the lane stays proportional to the change. ADVISORY until
  # the host crate grows real logic beyond the scaffold commands.
  # ---------------------------------------------------------------------------
  cargo-mutants-diff:
    name: cargo-mutants (--in-diff — advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install webkit build prerequisites (pinned apt list)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install pinned Rust toolchain (rust-toolchain.toml)
        run: rustup toolchain install

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install cargo-mutants (pinned)
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: cargo-mutants@27.1.0

      - name: Mutate only this PR's Rust diff
        shell: bash
        run: |
          git diff "origin/${GITHUB_BASE_REF}...HEAD" -- apps/desktop/src-tauri/ > mutants.diff
          if [ ! -s mutants.diff ]; then
            echo 'no Rust changes in this PR — nothing to mutate'
            exit 0
          fi
          cd apps/desktop/src-tauri
          cargo mutants --in-diff ../../../mutants.diff --timeout 300 -- --locked

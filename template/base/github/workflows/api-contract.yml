# API contract — the OpenAPI document is the desktop↔server treaty.
#   1. regen-diff: the committed apps/server/openapi.json must equal a fresh emit
#      (same check as the local `contracts` gate; here it cannot be skipped).
#   2. oasdiff vs the PR base's committed spec: BREAKING changes fail unless the PR
#      carries the 'api-breaking' label — an explicit, reviewable human decision
#      (the skew middleware means old desktops WILL talk to the new server).
#   3. skew-n1: the released (N-1) client contract must still be served compatibly.
#      Self-skips loudly until the first v* release tag exists.
# SOURCE: docs/harness/README.md (contract drift; version-skew doctrine)
name: api-contract

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'apps/server/**'
      - 'packages/schema/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: openapi regen-diff + breaking-change gate
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate OpenAPI and diff against the committed document
        run: |
          pnpm --filter server run openapi:emit
          git diff --exit-code -- apps/server/openapi.json

      # Extract the base branch's committed spec into the workspace (the oasdiff
      # action mounts the workspace, not /tmp). Missing on base = brand-new spec —
      # nothing to compare, loudly noted.
      - name: Extract base branch spec
        id: base-spec
        shell: bash
        run: |
          mkdir -p .contract
          if git show "origin/${GITHUB_BASE_REF}:apps/server/openapi.json" > .contract/base-openapi.json 2>/dev/null; then
            echo 'found=true' >> "$GITHUB_OUTPUT"
          else
            echo 'found=false' >> "$GITHUB_OUTPUT"
            echo "::notice::apps/server/openapi.json does not exist on ${GITHUB_BASE_REF} — first spec, breaking-change gate not applicable"
          fi

      # Breaking changes require the 'api-breaking' label: applying it is the
      # deliberate human act that acknowledges old clients will be broken.
      - name: oasdiff breaking-change gate (waived by the 'api-breaking' label)
        if: >-
          steps.base-spec.outputs.found == 'true' &&
          !contains(github.event.pull_request.labels.*.name, 'api-breaking')
        uses: oasdiff/oasdiff-action/breaking@291b6594ce617f22f49af5898ee038ed0b46e8fe # v0.1.5
        with:
          base: .contract/base-openapi.json
          revision: apps/server/openapi.json
          fail-on-diff: true

      - name: Note the waiver
        if: contains(github.event.pull_request.labels.*.name, 'api-breaking')
        run: echo "::warning::'api-breaking' label set — breaking-change gate waived; coordinate the desktop release (version-skew middleware will 409 old clients)"

  skew-n1:
    name: skew-n1 (released client contract still served)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history + tags: the newest v* tag defines the released (N-1) contract.
          fetch-depth: 0

      - name: Locate the latest release tag
        id: tag
        shell: bash
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$latest" ]; then
            echo "::notice::skew-n1 self-skips — no v* release tag exists yet; it activates on the first release"
            echo 'tag=' >> "$GITHUB_OUTPUT"
          else
            echo "comparing against released contract at $latest"
            echo "tag=$latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract the released spec
        if: steps.tag.outputs.tag != ''
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p .contract
          git show "${RELEASE_TAG}:apps/server/openapi.json" > .contract/n1-openapi.json

      # The desktop shipped at N-1 keeps calling this server after it deploys: any
      # change that breaks the RELEASED spec needs a coordinated desktop release
      # first (and will trip the skew middleware's major gate if versions diverge).
      - name: oasdiff breaking vs released contract
        if: steps.tag.outputs.tag != ''
        uses: oasdiff/oasdiff-action/breaking@291b6594ce617f22f49af5898ee038ed0b46e8fe # v0.1.5
        with:
          base: .contract/n1-openapi.json
          revision: apps/server/openapi.json
          fail-on-diff: true

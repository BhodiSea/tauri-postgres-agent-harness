# CodeQL SAST — TypeScript/JavaScript app code AND the workflows themselves (the
# 'actions' language catches untrusted-input and injection bugs in CI). Diff-aware on
# PR, full nightly. Rust SAST is covered by clippy -D warnings + cargo-deny in the
# quality-gate rust lane (CodeQL Rust support is not enabled here).
# Private repos need GitHub Advanced Security for SARIF upload; the analysis still runs.
# SOURCE: docs/harness/README.md (SAST layer)
name: codeql

on:
  pull_request:
  push:
    branches: ['{{DEFAULT_BRANCH}}']
  schedule:
    # Full nightly scan. 03:23 UTC.
    - cron: '23 3 * * *'

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: codeql (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, actions]
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: '/language:${{ matrix.language }}'

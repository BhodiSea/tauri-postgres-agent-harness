# gitleaks secret scanning — full-history on PR + push, running the PINNED BINARY
# directly (sha256-verified download) instead of the marketplace action: the binary is
# MIT-licensed with no org license key requirement, and the checksum pin removes the
# action-wrapper supply-chain hop. Pairs with the lefthook pre-commit
# `gitleaks protect --staged` and GitHub push protection (a repo setting).
# SOURCE: docs/harness/README.md (secret scanning)
name: gitleaks

on:
  pull_request:
  push:
    branches: ['{{DEFAULT_BRANCH}}']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (secret scan, full history)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so secrets in older commits are caught, not just the diff.
          fetch-depth: 0

      - name: Download and verify gitleaks binary (pinned version + sha256)
        shell: bash
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          cd "$RUNNER_TEMP"
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks

      - name: Scan full git history
        shell: bash
        run: |
          "$RUNNER_TEMP/gitleaks" git \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1 \
            .

# Lint the harness repo itself: workflow syntax + Actions security posture.
# Template workflows are stored dotless (template/**/github/workflows/) so they
# never execute here — stage them into .fixtures to lint them anyway.
name: lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Stage template workflows (stored dotless so they never execute here)
        run: |
          mkdir -p .fixtures/tpl/.github/workflows
          find template -path '*/github/workflows/*.yml' -exec cp {} .fixtures/tpl/.github/workflows/ \;
          # actionlint resolves its config relative to each file's project root
          # (the dir containing .github) — stage the shipped config alongside so
          # custom self-hosted labels (eval-live's gpu runner) are declared here too
          cp template/base/github/actionlint.yaml .fixtures/tpl/.github/actionlint.yaml
          ls .fixtures/tpl/.github/workflows
      - uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
        with:
          files: |
            .github/workflows/*.yml
            .fixtures/tpl/.github/workflows/*.yml

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7

  syntax-and-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: node scripts/check-syntax.mjs
      - name: Validate Claude Code plugin manifests (advisory)
        continue-on-error: true
        run: npx --yes @anthropic-ai/claude-code@latest plugin validate .

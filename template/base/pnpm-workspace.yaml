# pnpm-workspace.yaml — workspace layout + THE version catalog.
# Every external version number in this monorepo lives HERE; workspace
# package.json files reference "catalog:" so upgrades are one-line diffs and
# version drift between workspaces is structurally impossible.
packages:
  - apps/*
  - packages/*

# pnpm 11 skips dependency build scripts unless explicitly approved here
# (`allowBuilds`; the pnpm-10-era key was onlyBuiltDependencies).
allowBuilds:
  esbuild: true
  lefthook: true

catalog:
  # ---- toolchain --------------------------------------------------------------
  typescript: ~6.0.3 # typescript-eslint 8.63.x supports >=4.8.4 <6.1.0
  tsx: ^4.23.0
  '@biomejs/biome': 2.5.3 # exact: formatter drift would churn the format gate
  eslint: ^9.39.4 # 9.x line: eslint-plugin-jsx-a11y peers cap at ^9
  typescript-eslint: ^8.63.0
  eslint-plugin-jsx-a11y: ^6.10.2
  eslint-plugin-react-hooks: ^7.1.1 # includes the React Compiler rule set (merged in v6)
  eslint-plugin-sonarjs: ^4.1.0
  knip: ^6.25.0
  dependency-cruiser: ^18.0.0
  lefthook: ^2.1.10
  '@commitlint/cli': ^21.2.1
  '@commitlint/config-conventional': ^21.2.0
  cspell: ^10.0.1
  # ---- test -------------------------------------------------------------------
  vitest: 4.1.10 # exact: @vitest/coverage-v8 peer-pins the identical version
  '@vitest/coverage-v8': 4.1.10
  jsdom: ^29.1.1
  '@testing-library/react': ^16.3.2
  '@testing-library/jest-dom': ^6.9.1
  '@testing-library/user-event': ^14.6.1
  fast-check: ^4.9.0
  # ---- server -----------------------------------------------------------------
  hono: ^4.12.28
  '@hono/node-server': ^2.0.8
  '@hono/zod-openapi': ^1.4.0 # 1.x line is the zod-4-compatible line
  zod: ^4.4.3
  jose: ^6.2.3
  pino: ^10.3.1
  pino-pretty: ^13.1.3
  postgres: ^3.4.9
  drizzle-orm: ^0.45.2
  drizzle-zod: ^0.8.3
  drizzle-kit: 0.31.10 # exact: kit releases have changed migration layout mid-minor
  '@types/node': ^22.20.1 # matches the node >=22 engines floor
  # ---- desktop ----------------------------------------------------------------
  react: ^19.2.7
  react-dom: ^19.2.7
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  vite: ^8.1.4
  '@vitejs/plugin-react': ^6.0.3
  babel-plugin-react-compiler: 1.0.0 # exact per BUILD-SPEC (compiler output stability)
  tailwindcss: ^4.3.2
  '@tailwindcss/vite': ^4.3.2
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  '@tauri-apps/api': ^2.11.1
  '@tauri-apps/cli': 2.11.4 # exact per BUILD-SPEC (bundler/signing file-set regressions)
  '@tauri-apps/plugin-log': ^2.8.0
  '@rolldown/plugin-babel': ^0.2.3 # React Compiler wiring for @vitejs/plugin-react v6
  '@babel/core': ^8.0.1
  '@types/babel__core': ^7.20.5
  # ---- harness runtime (root tools/mcp + tests/rls) -----------------------------
  '@modelcontextprotocol/sdk': ^1.29.0


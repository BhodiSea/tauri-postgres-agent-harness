# ci-windows-release module — the signed Windows release DAG, tag-triggered:
#   build (NSIS, offline WebView2) → sign (Azure Trusted Signing, only when the
#   secrets exist) → signtool verify /pa /all → NSIS /S install/uninstall smoke →
#   Defender scan → installer size budget → checksums → attach to the release.
# HONEST DEGRADE: without signing secrets the workflow still builds, smokes, and
# uploads — but the artifact is loudly labeled UNSIGNED and signtool verify is
# skipped, never faked. Configure the AZURE_* secrets on a protected environment.
# SOURCE: docs/harness/gates-catalog.md (ci-windows-release module)
name: release-windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # attach installer + checksums to the GitHub release

concurrency:
  group: release-windows-${{ github.ref }}
  # Never cancel a release build mid-flight; queue instead.
  cancel-in-progress: false

env:
  # Generous by design: the NSIS bundle embeds the offline WebView2 installer
  # (~150 MB). Ratchet DOWN once you know your real size — a sudden jump is how
  # bundled-dependency accidents (duplicate runtimes, debug symbols) get caught.
  INSTALLER_SIZE_BUDGET_MB: 300

jobs:
  release:
    name: build, sign, verify, smoke
    runs-on: windows-latest
    environment: release
    env:
      # Secrets cannot be referenced in step `if:` directly — surface presence as env.
      HAVE_SIGNING: ${{ secrets.AZURE_TENANT_ID != '' && secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_SECRET != '' }}
    steps:
      # Windows agent: audit-only egress policy (blocking is Linux-only).
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain (rust-toolchain.toml)
        run: rustup toolchain install

      - name: Enable Corepack
        run: corepack enable

      # No dependency caches on the release path (zizmor cache-poisoning surface):
      # a tag build pays full price for a clean provenance story.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Tauri release build (NSIS bundle)
        run: pnpm --filter desktop exec tauri build

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $bundleDir = 'apps/desktop/src-tauri/target/release/bundle/nsis'
          $installer = Get-ChildItem -Path $bundleDir -Filter '*.exe' | Select-Object -First 1
          if ($null -eq $installer) { Write-Error "no NSIS installer found under $bundleDir"; exit 1 }
          "path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "dir=$($installer.DirectoryName)" >> $env:GITHUB_OUTPUT
          Write-Host "installer: $($installer.FullName) ($([math]::Round($installer.Length / 1MB, 1)) MB)"

      # ---- signing (only when the Trusted Signing secrets are configured) --------
      - name: Sign installer (Azure Trusted Signing)
        if: env.HAVE_SIGNING == 'true'
        uses: azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: ${{ steps.installer.outputs.dir }}
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # /pa = Authenticode policy; /all = verify ALL signatures incl. the timestamp
      # chain. This is the gate that proves the signature is trustworthy on a clean
      # machine, not merely that the signing call returned 0.
      - name: signtool verify /pa /all
        if: env.HAVE_SIGNING == 'true'
        shell: pwsh
        env:
          INSTALLER: ${{ steps.installer.outputs.path }}
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if ($null -eq $signtool) { Write-Error 'signtool.exe not found in the Windows SDK'; exit 1 }
          & $signtool.FullName verify /pa /all /v $env:INSTALLER
          if ($LASTEXITCODE -ne 0) { Write-Error 'signature verification FAILED'; exit 1 }

      - name: Label unsigned build (no signing secrets configured)
        if: env.HAVE_SIGNING != 'true'
        shell: pwsh
        env:
          BUNDLE_DIR: ${{ steps.installer.outputs.dir }}
        run: |
          Write-Host '::warning::AZURE_* signing secrets not configured — this artifact is UNSIGNED and must not ship to end users.'
          Set-Content -Path (Join-Path $env:BUNDLE_DIR 'UNSIGNED-BUILD.txt') -Value 'This installer was built WITHOUT code signing (no Trusted Signing secrets in CI). Do not distribute.'

      # ---- silent install / uninstall smoke --------------------------------------
      - name: NSIS /S silent install smoke
        shell: pwsh
        env:
          INSTALLER: ${{ steps.installer.outputs.path }}
        run: |
          $proc = Start-Process -FilePath $env:INSTALLER -ArgumentList '/S' -Wait -PassThru
          if ($proc.ExitCode -ne 0) { Write-Error "silent install exited $($proc.ExitCode)"; exit 1 }
          $installDir = Join-Path $env:ProgramFiles '{{PROJECT_NAME}}'
          if (-not (Test-Path $installDir)) { Write-Error "expected install dir missing: $installDir"; exit 1 }
          $uninstaller = Join-Path $installDir 'uninstall.exe'
          if (-not (Test-Path $uninstaller)) { Write-Error "uninstaller missing: $uninstaller"; exit 1 }
          Write-Host "installed OK at $installDir"
          $unproc = Start-Process -FilePath $uninstaller -ArgumentList '/S' -Wait -PassThru
          if ($unproc.ExitCode -ne 0) { Write-Error "silent uninstall exited $($unproc.ExitCode)"; exit 1 }
          Start-Sleep -Seconds 5 # NSIS uninstallers detach to delete themselves
          if (Test-Path (Join-Path $installDir '{{PROJECT_NAME}}.exe')) {
            Write-Error 'app binary still present after uninstall'; exit 1
          }
          Write-Host 'uninstall OK'

      # ---- Defender scan ----------------------------------------------------------
      - name: Defender scan (on-demand, remediation disabled)
        shell: pwsh
        env:
          BUNDLE_DIR: ${{ steps.installer.outputs.dir }}
        run: |
          Get-MpComputerStatus | Format-List AMServiceEnabled, AntivirusEnabled, AntivirusSignatureLastUpdated
          try { Update-MpSignature -ErrorAction Stop } catch { Write-Host "::warning::signature update failed: $_" }
          # -DisableRemediation: report, never quarantine — we want the verdict, not a mangled artifact.
          & "$env:ProgramFiles\Windows Defender\MpCmdRun.exe" -Scan -ScanType 3 -File $env:BUNDLE_DIR -DisableRemediation
          if ($LASTEXITCODE -eq 2) { Write-Error 'Windows Defender flagged the installer'; exit 1 }
          if ($LASTEXITCODE -ne 0) { Write-Error "MpCmdRun exited $LASTEXITCODE"; exit 1 }
          Write-Host 'Defender scan clean'

      # ---- size budget + checksums -----------------------------------------------
      - name: Installer size budget
        shell: pwsh
        env:
          INSTALLER: ${{ steps.installer.outputs.path }}
        run: |
          $sizeMb = [math]::Round((Get-Item $env:INSTALLER).Length / 1MB, 1)
          Write-Host "installer size: $sizeMb MB (budget: $env:INSTALLER_SIZE_BUDGET_MB MB)"
          if ($sizeMb -gt [double]$env:INSTALLER_SIZE_BUDGET_MB) {
            Write-Error "installer exceeds the size budget — investigate what got bundled before shipping"
            exit 1
          }

      - name: Checksums
        shell: pwsh
        env:
          BUNDLE_DIR: ${{ steps.installer.outputs.dir }}
        run: |
          $lines = Get-ChildItem -Path $env:BUNDLE_DIR -Filter '*.exe' | ForEach-Object {
            "$((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower())  $($_.Name)"
          }
          Set-Content -Path (Join-Path $env:BUNDLE_DIR 'checksums.txt') -Value $lines
          Get-Content (Join-Path $env:BUNDLE_DIR 'checksums.txt')

      - name: Upload release artifacts (workflow artifact)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-installer
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/checksums.txt
            apps/desktop/src-tauri/target/release/bundle/nsis/UNSIGNED-BUILD.txt
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          BUNDLE_DIR: ${{ steps.installer.outputs.dir }}
          TAG: ${{ github.ref_name }}
        run: |
          # release-please creates the release with the tag; a manually pushed tag may not
          # have one yet — create a draft instead of failing the upload.
          gh release view $env:TAG 2>$null
          if ($LASTEXITCODE -ne 0) { gh release create $env:TAG --draft --generate-notes }
          $files = Get-ChildItem -Path $env:BUNDLE_DIR -Include '*.exe', 'checksums.txt', 'UNSIGNED-BUILD.txt' -Recurse |
            ForEach-Object { $_.FullName }
          gh release upload $env:TAG @files --clobber

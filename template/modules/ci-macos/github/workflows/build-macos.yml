# ci-macos module — macOS development build lane. Windows is the release target;
# this lane exists so contributors on macOS get a CI answer to "does the host crate
# still build and bundle on my platform?". UNSIGNED by design (ad-hoc signature
# only): no notarization, no distribution — a labeled development artifact.
# Manual dispatch only: pays a macOS runner bill only when someone asks.
# SOURCE: docs/harness/gates-catalog.md (ci-macos module)
name: build-macos

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: macos build (unsigned, development)
    runs-on: macos-latest
    steps:
      # macOS agent: audit-only egress policy (blocking is Linux-only).
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain (rust-toolchain.toml)
        run: rustup toolchain install

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `--bundles app` only: a .dmg adds nothing to a dev smoke, and skipping it
      # keeps the lane fast. Tauri ad-hoc-signs the bundle (no identity configured).
      - name: Tauri debug build (.app bundle, ad-hoc signature)
        run: pnpm --filter desktop exec tauri build --debug --bundles app

      - name: Label as unsigned development artifact
        run: |
          echo '::notice::macOS build is UNSIGNED (ad-hoc) — development smoke only, not distributable. Windows (ci-windows-release) is the release lane.'
          touch apps/desktop/src-tauri/target/debug/bundle/macos/UNSIGNED-DEV-BUILD.txt

      - name: Upload .app bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-dev-app
          path: |
            apps/desktop/src-tauri/target/debug/bundle/macos/*.app
            apps/desktop/src-tauri/target/debug/bundle/macos/UNSIGNED-DEV-BUILD.txt
          retention-days: 7

# CI merge gate. pnpm + Corepack + rustup. The static job runs the SAME validate chain
# the local Stop hook enforces (tools/validate.mjs) with HARNESS_REQUIRE_TOOLCHAINS=1,
# so a CI pass and a local pass mean the same thing — and skips fail closed here.
# Runtime jobs prove the two claims static analysis cannot: live RLS isolation against
# real Postgres, and a browsable, WCAG-clean app shell (Playwright, mock IPC).
# SOURCE: docs/harness/README.md (CI merge gate; skip-local / fail-closed-CI asymmetry)
name: quality-gate

on:
  pull_request:
  push:
    branches: ['{{DEFAULT_BRANCH}}']
  schedule:
    # Nightly: keeps the path-filtered desktop-windows job honest between desktop PRs.
    - cron: '11 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned Tauri v2 Linux build prerequisites (ubuntu-24.04 / webkit2gtk 4.1 ABI).
  # One place, three jobs — drift between jobs would make "green" ambiguous.
  WEBKIT_APT_PACKAGES: >-
    libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev
    libssl-dev libayatana-appindicator3-dev librsvg2-dev

jobs:
  # ---------------------------------------------------------------------------
  # Static floor — the full validate chain, toolchains REQUIRED (no silent skips).
  # rust-fmt / rust-check / build all run for real: rustup + webkit deps present.
  # ---------------------------------------------------------------------------
  static:
    name: static (validate floor)
    runs-on: ubuntu-latest
    env:
      HARNESS_REQUIRE_TOOLCHAINS: '1'
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history: the migrations gate diffs against the PR base ref —
          # a shallow clone makes that ref unresolvable and (fail-closed) red.
          fetch-depth: 0

      - name: Install webkit build prerequisites (pinned apt list)
        run: |
          sudo apt-get update
          # shellcheck disable=SC2086 # intentional word-splitting of the package list
          sudo apt-get install -y --no-install-recommends $WEBKIT_APT_PACKAGES

      - name: Install pinned Rust toolchain (rust-toolchain.toml)
        run: |
          rustup toolchain install # resolves the channel + components from rust-toolchain.toml
          rustup show active-toolchain

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: Enable Corepack (pins pnpm from package.json#packageManager)
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # One entrypoint for the whole floor — identical steps to the local Stop hook, with
      # the hardcoded FLOOR merged in so an edited config can never weaken CI.
      # SOURCE: docs/harness/README.md (single validate entrypoint; CI floor)
      - name: Validate (min floor, toolchains required)
        run: node tools/validate.mjs --min-floor

  # ---------------------------------------------------------------------------
  # Unit + contract tests — Vitest (unit-node + unit-dom; the rls project
  # self-skips politely here, the runtime-rls job below runs it for real).
  # ---------------------------------------------------------------------------
  unit:
    name: unit (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history: the diff-coverage step below diffs against the PR
          # base's merge-base — a shallow clone makes that ref unresolvable
          # and (fail-closed) red.
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit + contract tests
        run: pnpm exec vitest run --coverage

      # Per-file floors on every source file the PR touches, read from the
      # coverage-final.json the vitest step above just wrote — the aggregate
      # thresholds cannot see one untested module inside a green total.
      - name: Diff coverage (per-file floors on changed files)
        run: node tools/check-diff-coverage.mjs

      # Copy-paste rot: the same Stop-chain duplication gate an agent runs at turn-end,
      # enforced on the PR. Ramped on pre-0.1.6 baseVersions (a NOTE until graduated).
      - name: Duplication (token clones across apps/*/src + packages/*/src)
        run: node tools/check-duplication.mjs

      # Assertion PRESENCE (the cheap half): no `.only` (it silently disables the whole
      # suite), no disabled tests, no test body without an assertion. The lane below is what
      # actually proves a test would NOTICE a break.
      - name: Test quality (assertions present, nothing focused or disabled)
        run: node tools/check-test-quality.mjs

  # ---------------------------------------------------------------------------
  # MUTATION — the assertion-QUALITY gate, and the only check here that asks the
  # question coverage cannot: change the code, does a test go red?
  #
  # Blocking, and CI-only: a run is minutes, and the Stop chain's warm-validate budget
  # is ~6s. Scoped to the CRITICAL files THIS PR touched (tools/mutation-scope.mjs) —
  # auth, the DAL, the error envelope, the route wiring, and the desktop's auth/transport
  # seam — so the cost is proportional to the change and a docs-only PR pays nothing.
  # The nightly full run over the whole critical surface lives in mutation.yml.
  #
  # The gate is the SET-based ratchet, never a score threshold: a NEW surviving mutant
  # reds; an accepted one is a reviewed, reasoned entry in tools/mutation-baseline.json.
  # ---------------------------------------------------------------------------
  mutation:
    name: mutation (critical files in this diff)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history: the scoper diffs against the PR base's merge-base. A shallow
          # clone makes that ref unresolvable — and mutation-scope.mjs FAILS CLOSED there
          # rather than printing an empty list, which would look exactly like "this PR
          # touched nothing critical" and pass forever.
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Which critical files does this change touch?
        id: scope
        run: echo "files=$(node tools/mutation-scope.mjs)" >> "$GITHUB_OUTPUT"

      - name: Mutate them (StrykerJS)
        if: steps.scope.outputs.files != ''
        run: pnpm exec stryker run stryker.config.mjs --mutate "${{ steps.scope.outputs.files }}"

      # The gate. A survivor the baseline does not accept reds the PR.
      - name: Mutation ratchet (survivors vs the committed baseline)
        if: steps.scope.outputs.files != ''
        run: node tools/check-mutation-ratchet.mjs

      - name: No critical files in this diff — nothing to mutate
        if: steps.scope.outputs.files == ''
        run: echo 'This change touches no file on the critical surface (see tools/lib/mutation-critical.mjs).'

  # ---------------------------------------------------------------------------
  # Runtime RLS — the headline isolation gate against REAL Postgres 16 + pgvector
  # (same digest-pinned image as docker-compose.yml). run-rls.mjs fresh-applies all
  # migrations, then runs the isolation suite; CI=true makes every skip fail closed.
  # The job asserts the literal '[rls] OK' marker so a truncated run cannot green.
  # ---------------------------------------------------------------------------
  runtime-rls:
    name: runtime (rls isolation, real postgres)
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: '{{DB_NAME}}'
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U postgres -d {{DB_NAME}}"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Same role bootstrap docker-compose runs on first boot: app_migrator owns the
      # schema, app_api is NOSUPERUSER + NOBYPASSRLS (FORCE RLS applies, no escape hatch).
      - name: Provision database roles (db/init/01-roles.sql)
        run: psql 'postgres://postgres:postgres@127.0.0.1:5432/{{DB_NAME}}' -v ON_ERROR_STOP=1 -f db/init/01-roles.sql

      - name: RLS isolation suite (migration fresh-apply + isolation matrix + catalog gate)
        shell: bash
        run: |
          node tests/rls/run-rls.mjs 2>&1 | tee rls-output.log
          # Belt and braces: the exit code gates above; the marker proves the runner
          # reached its final line (a wedged/truncated run cannot count as green).
          grep -F '[rls] OK' rls-output.log

  # ---------------------------------------------------------------------------
  # Rust lane — clippy as errors, host-crate tests, cargo-deny (deny.toml at the
  # repo root), and capabilities-vs-schema validation: the committed capability
  # file must validate against the schema tauri-build regenerates from the crate.
  # ---------------------------------------------------------------------------
  rust:
    name: rust (clippy + test + deny + capabilities)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install webkit build prerequisites (pinned apt list)
        run: |
          sudo apt-get update
          # shellcheck disable=SC2086 # intentional word-splitting of the package list
          sudo apt-get install -y --no-install-recommends $WEBKIT_APT_PACKAGES

      - name: Install pinned Rust toolchain (rust-toolchain.toml)
        run: rustup toolchain install

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: Clippy (all targets, warnings are errors)
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets --locked -- -D warnings

      - name: Host crate tests (includes the specta bindings export test)
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --locked

      # The export test above regenerates src/ipc/bindings.ts; any diff = committed
      # bindings drifted from the #[tauri::command] surface.
      - name: Specta bindings drift (committed vs regenerated)
        run: git diff --exit-code -- apps/desktop/src/ipc/bindings.ts

      - name: cargo-deny (advisories, licenses, bans, sources — deny.toml)
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          manifest-path: apps/desktop/src-tauri/Cargo.toml
          command: check

      # tauri-build (run by cargo above) regenerates gen/schemas/*.json from the crate's
      # actual permission surface. Validating the COMMITTED capability file against the
      # FRESH schema catches a capability that names permissions the crate no longer has.
      # Cheap here because the build script already ran; if the schema is absent that is
      # itself a failure — this job exists to produce it.
      - name: Capabilities vs fresh schema (ajv, draft-07)
        shell: bash
        run: |
          schema=apps/desktop/src-tauri/gen/schemas/desktop-schema.json
          if [ ! -f "$schema" ]; then
            echo "::error::$schema was not generated by tauri-build — cannot validate capabilities"
            exit 1
          fi
          corepack enable
          pnpm dlx ajv-cli@5.0.0 validate --spec=draft7 --strict=false \
            -s "$schema" -d 'apps/desktop/src-tauri/capabilities/*.json'

  # ---------------------------------------------------------------------------
  # Playwright fast lane — chromium against `vite dev`, NO Tauri binary: the IPC
  # bridge is mocked (e2e/mock-ipc.ts) and /healthz is stubbed per spec. Covers the
  # axe WCAG 2.2 AA scan and the degraded-network state. playwright.config.ts owns
  # the webServer (vite dev on :1420 with a stub VITE_API_ORIGIN).
  # ---------------------------------------------------------------------------
  e2e-fast:
    name: e2e fast lane (playwright, mock IPC)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install chromium --with-deps

      - name: e2e specs (a11y axe wcag22aa + degraded network)
        run: pnpm exec playwright test

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Interaction-latency lane — wall-clock UX budgets (TTI, arrow-key latency,
  # main-thread long tasks) in real chromium against `vite dev`. Deliberately
  # OUTSIDE tools/validate.mjs and the Stop hook: wall-clock browser timing on
  # shared runners is the flakiest measurement in the repo, and the agent-time
  # chain's determinism + warm ≈5s promise are inviolable — so the lane lives
  # here as a BLOCKING job instead (HARNESS_PERF_LANE=1 is what makes the perf
  # project exist at all; see playwright.config.ts). Budgets are generous
  # median-of-N numbers in tools/interaction-budget.json (seeded): they catch
  # step-function regressions (a 300ms stall on keydown), not 10% drifts, and
  # the harness selftest proves the lane can fail (busy-loop canary). A
  # pre-0.1.5 install has no budget file yet — loud skip, never a false red.
  # ---------------------------------------------------------------------------
  perf-lane:
    name: perf lane (interaction latency + memory ceiling, wall-clock)
    runs-on: ubuntu-latest
    env:
      HARNESS_PERF_LANE: '1'
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install chromium --with-deps

      # Both wall-clock specs live in the `perf` project: interaction-latency (TTI, arrow-key
      # latency, long tasks) and memory (the leak ceiling — mount/unmount every route N times
      # and diff the live CDP listener/node/heap counters after a forced GC). Single worker:
      # these are wall-clock samples and must never share a CPU.
      - name: Interaction-latency + memory-ceiling budgets (perf project only, single worker)
        run: |
          if [ ! -f tools/interaction-budget.json ]; then
            echo "::warning::tools/interaction-budget.json absent — perf lane SKIPPED (pre-0.1.5 install). Adopt it deliberately: npx tauri-postgres-agent-harness update --refresh-seeded tools/interaction-budget.json (the specs + perf project already arrived with update; see docs/harness/gates-catalog.md, CI-only lanes)."
            exit 0
          fi
          pnpm exec playwright test --project perf --workers 1

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-lane-traces
          path: test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # The desktop<->server seam. Every other lane mocks the network, which is how the
  # desktop once shipped sending no Authorization header at all — list, create and
  # paginate each 401'd against the real server while all 22 gates, the whole e2e
  # suite and the perf lane stayed green. This lane stubs nothing but the Tauri IPC
  # (the host that holds the token): real bundle -> real fetch -> real Hono server
  # -> real Postgres under FORCE RLS. It needs those services, so it lives in CI and
  # never in the agent-time chain (tools/check-e2e.mjs strips its env var).
  # ---------------------------------------------------------------------------
  integration-lane:
    name: integration lane (desktop <-> server, real postgres)
    runs-on: ubuntu-latest
    env:
      HARNESS_INTEGRATION_LANE: '1'
      AUTH_MODE: stub
      NODE_ENV: development
      PORT: '8787'
      VITE_API_ORIGIN: 'http://127.0.0.1:8787'
      DATABASE_URL: 'postgres://app_api:postgres@127.0.0.1:5432/{{DB_NAME}}'
      MIGRATOR_DATABASE_URL: 'postgres://app_migrator:postgres@127.0.0.1:5432/{{DB_NAME}}'
      # The vite dev server is the page origin in this lane; the packaged app's real
      # origins (tauri://localhost, http://tauri.localhost) are the server default.
      CORS_ORIGINS: 'http://localhost:1420'
    services:
      db:
        image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: '{{DB_NAME}}'
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U postgres -d {{DB_NAME}}"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install chromium --with-deps

      - name: Provision database roles (db/init/01-roles.sql)
        run: psql 'postgres://postgres:postgres@127.0.0.1:5432/{{DB_NAME}}' -v ON_ERROR_STOP=1 -f db/init/01-roles.sql

      - name: Apply migrations
        run: pnpm db:migrate

      # The token the HOST would hold on a real desktop. Minted here, handed to the
      # server (which verifies it) and to the mocked Tauri host (which hands it to the
      # webview) — so the lane exercises the same bearer path production does.
      - name: Mint a stub-mode dev token and boot the API server
        shell: bash
        run: |
          set -euo pipefail
          APP_ACCESS_TOKEN="$(pnpm --filter server mint-dev-token | tail -1)"
          if [ -z "$APP_ACCESS_TOKEN" ]; then
            echo "::error::mint-dev-token produced no token — the lane cannot prove the auth seam"
            exit 1
          fi
          echo "APP_ACCESS_TOKEN=$APP_ACCESS_TOKEN" >> "$GITHUB_ENV"
          pnpm --filter server dev > /tmp/server.log 2>&1 &
          for _ in $(seq 1 40); do
            if curl -fsS -m 2 "http://127.0.0.1:8787/healthz" > /dev/null; then
              echo "server up"; exit 0
            fi
            sleep 1
          done
          echo "::error::the API server never became healthy"; cat /tmp/server.log; exit 1

      - name: Desktop <-> server integration lane
        run: pnpm exec playwright test --project integration --workers 1

      - name: Server log on failure
        if: failure()
        run: cat /tmp/server.log || true

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-lane-traces
          path: test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Windows debug build — the artifact this repo actually ships. Expensive, so:
  # per-PR only when apps/desktop/** (or the lockfile/workspace) changed, plus the
  # nightly schedule and manual dispatch as the unconditional net.
  # ---------------------------------------------------------------------------
  changes:
    name: changed paths
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            desktop:
              - 'apps/desktop/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'rust-toolchain.toml'

  desktop-windows:
    name: desktop build (windows, debug)
    needs: [changes]
    # Runs when: nightly/dispatch (always), or a PR that touched the desktop surface.
    # `!cancelled()` lets it run even though `changes` is skipped outside PRs.
    if: >-
      !cancelled() &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' && needs.changes.outputs.desktop == 'true'))
    runs-on: windows-latest
    steps:
      # Windows agent supports the audit policy (no egress blocking on Windows runners).
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain (rust-toolchain.toml)
        run: rustup toolchain install

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Tauri debug build (NSIS bundle, embedded offline WebView2)
        run: pnpm --filter desktop exec tauri build --debug

      # Installer size vs the committed budget (tools/perf-baseline.json,
      # installerBudgetBytes — regenerated only via `pnpm perf:baseline` in a
      # reviewed commit). This is a DEBUG artifact embedding the ~150 MB offline
      # WebView2, so the number is a coarse bundled-dependency canary (duplicate
      # runtimes, debug-symbol explosions), not a ship-size promise; the shipped
      # budget is generous — read the printed size from the first nightly run and
      # ratchet DOWN. Loud skip when the baseline is absent (pre-0.1.5 installs);
      # a baseline WITHOUT the field fails closed — reviewable data or no gate.
      - name: Installer size budget (tools/perf-baseline.json)
        shell: pwsh
        run: |
          if (-not (Test-Path 'tools/perf-baseline.json')) {
            Write-Host '::warning::tools/perf-baseline.json absent - installer size budget SKIPPED. Generate it with `pnpm perf:baseline` in a reviewed commit (see docs/runbooks/harness-upgrade.md).'
            exit 0
          }
          $baseline = Get-Content 'tools/perf-baseline.json' -Raw | ConvertFrom-Json
          $budget = $baseline.installerBudgetBytes
          if ($null -eq $budget -or $budget -le 0) {
            Write-Error 'tools/perf-baseline.json carries no positive installerBudgetBytes - the size gate fails closed on unreviewable data; re-run `pnpm perf:baseline` and commit the diff'
            exit 1
          }
          $installer = Get-ChildItem 'apps/desktop/src-tauri/target/debug/bundle/nsis/*.exe' | Select-Object -First 1
          if ($null -eq $installer) { Write-Error 'no NSIS installer found under target/debug/bundle/nsis'; exit 1 }
          $size = (Get-Item $installer.FullName).Length
          Write-Host "installer: $($installer.Name) - $size bytes ($([math]::Round($size / 1MB, 1)) MB); budget $budget bytes ($([math]::Round($budget / 1MB, 1)) MB)"
          if ($size -gt $budget) {
            Write-Error 'installer exceeds installerBudgetBytes - investigate what got bundled (duplicate runtime? debug symbols?) or, after a DELIBERATE change, raise the budget in tools/perf-baseline.json via a reviewed commit'
            exit 1
          }

      - name: Upload debug installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-debug-installer
          path: apps/desktop/src-tauri/target/debug/bundle/nsis/*.exe
          retention-days: 7
